<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lead Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Submit Your Information</h2>

<form id="leadForm">

<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="state" required>

<option value="">Select State</option>

<option>AL</option>
<option>AR</option>
<option>AZ</option>
<option>CO</option>
<option>FL</option>
<option>GA</option>
<option>IA</option>
<option>IL</option>
<option>IN</option>
<option>KS</option>
<option>KY</option>
<option>LA</option>
<option>MI</option>
<option>MO</option>
<option>MS</option>
<option>MT</option>
<option>NC</option>
<option>NE</option>
<option>NJ</option>
<option>NV</option>
<option>OH</option>
<option>OK</option>
<option>PA</option>
<option>SC</option>
<option>TN</option>
<option>TX</option>
<option>VA</option>

</select>

<input type="text" id="zip" placeholder="ZIP Code" required>

<button type="submit">Submit</button>

</form>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
